<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A1A; font-family: 'Share Tech Mono', monospace; padding: 20px; }
  .era { margin-bottom: 18px; }
  .era-title { font-family: 'Exo 2', sans-serif; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
  .swatches { display: flex; gap: 6px; }
  .sw { flex: 1; }
  .chip { height: 44px; border-radius: 2px; }
  .hex { font-size: 9px; color: #5858AA; margin-top: 4px; text-align: center; }
</style>
</head>
<body>
  <div class="era">
    <div class="era-title" style="color:#C8342A;">ERA A — Americana 50s/60s</div>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:#C8342A;"></div><div class="hex">#C8342A</div></div>
      <div class="sw"><div class="chip" style="background:#F5F0DC; border:1px solid #333;"></div><div class="hex" style="color:#9898CC">#F5F0DC</div></div>
      <div class="sw"><div class="chip" style="background:#2AB8C4;"></div><div class="hex">#2AB8C4</div></div>
      <div class="sw"><div class="chip" style="background:#1A1A1A;"></div><div class="hex">#1A1A1A</div></div>
      <div class="sw"><div class="chip" style="background:#FFFFFF; border:1px solid #333;"></div><div class="hex" style="color:#9898CC">#FFFFFF</div></div>
    </div>
  </div>
  <div class="era">
    <div class="era-title" style="color:#D4621A;">ERA C — Groovy 70s</div>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:#D4621A;"></div><div class="hex">#D4621A</div></div>
      <div class="sw"><div class="chip" style="background:#7A8C2A;"></div><div class="hex">#7A8C2A</div></div>
      <div class="sw"><div class="chip" style="background:#5C3A1E;"></div><div class="hex">#5C3A1E</div></div>
      <div class="sw"><div class="chip" style="background:#C8A820;"></div><div class="hex">#C8A820</div></div>
      <div class="sw"><div class="chip" style="background:#F0E8D0; border:1px solid #333;"></div><div class="hex" style="color:#9898CC">#F0E8D0</div></div>
      <div class="sw"><div class="chip" style="background:#A0522D;"></div><div class="hex">#A0522D</div></div>
      <div class="sw"><div class="chip" style="background:#1A7A7A;"></div><div class="hex">#1A7A7A</div></div>
    </div>
  </div>
  <div class="era">
    <div class="era-title" style="color:#C0C0C0;">ERA E — Pixel 90s</div>
    <div class="swatches">
      <div class="sw"><div class="chip" style="background:#C0C0C0;"></div><div class="hex" style="color:#9898CC">#C0C0C0</div></div>
      <div class="sw"><div class="chip" style="background:#000080;"></div><div class="hex">#000080</div></div>
      <div class="sw"><div class="chip" style="background:#800000;"></div><div class="hex">#800000</div></div>
      <div class="sw"><div class="chip" style="background:#008080;"></div><div class="hex">#008080</div></div>
      <div class="sw"><div class="chip" style="background:#808080;"></div><div class="hex" style="color:#9898CC">#808080</div></div>
      <div class="sw"><div class="chip" style="background:#FFFFFF; border:1px solid #333;"></div><div class="hex" style="color:#9898CC">#FFFFFF</div></div>
      <div class="sw"><div class="chip" style="background:#000000; border:1px solid #333;"></div><div class="hex">#000000</div></div>
    </div>
  </div>
</body>
</html>
