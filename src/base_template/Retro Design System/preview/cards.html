<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Exo+2:wght@400;500;700&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A1A; padding: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; align-items: start; }
  .label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: #5858AA; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }

  /* ERA D Card */
  .card-d { background: #0F0F2E; border: 1px solid #00F0FF; border-radius: 2px; padding: 18px; position: relative; overflow: hidden; transition: all 300ms; }
  .card-d::after { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px); pointer-events: none; }
  .card-d:hover { box-shadow: 0 0 8px #00F0FF, 0 0 20px #00F0FF66; transform: translateY(-4px); }
  .card-d h4 { font-family: 'Orbitron', sans-serif; font-size: 13px; color: #E8E8FF; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
  .card-d p { font-family: 'Exo 2', sans-serif; font-size: 12px; color: #9898CC; line-height: 1.5; }

  /* Arcade Card */
  .card-arcade { background: #13133A; border: 3px solid #FF2D78; border-radius: 2px; padding: 18px; text-align: center; }
  .card-arcade .score { font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 700; color: #FF2D78; text-shadow: 0 0 8px #FF2D78, 0 0 20px #FF2D7866; }
  .card-arcade .name { font-family: 'Exo 2', sans-serif; font-size: 11px; color: #9898CC; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }

  /* Cassette Card */
  .card-cassette { background: #1A0A2A; border: 2px solid #BF00FF; border-radius: 2px; overflow: hidden; }
  .cassette-stripe { height: 8px; background: linear-gradient(90deg, #FF2D78 0%, #FF2D78 25%, #BF00FF 25%, #BF00FF 50%, #00F0FF 50%, #00F0FF 75%, #FFE600 75%); }
  .cassette-body { padding: 14px; }
  .cassette-body h4 { font-family: 'Orbitron', sans-serif; font-size: 11px; color: #E8E8FF; letter-spacing: 0.1em; text-transform: uppercase; }
  .cassette-body .side { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #9898CC; margin-top: 6px; }
  .cassette-reels { display: flex; gap: 8px; margin-top: 10px; }
  .reel { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #BF00FF; display: flex; align-items: center; justify-content: center; }
  .reel::after { content: ""; width: 6px; height: 6px; border-radius: 50%; background: #BF00FF; }
</style>
</head>
<body>
  <div>
    <div class="label">Card — ERA D</div>
    <div class="card-d">
      <h4>Signal Boost</h4>
      <p>Interface panel for real-time data monitoring. Hover to intensify.</p>
    </div>
  </div>
  <div>
    <div class="label">Card — Arcade</div>
    <div class="card-arcade">
      <div class="score">84,720</div>
      <div class="name">HIGH SCORE · PLAYER 1</div>
    </div>
  </div>
  <div>
    <div class="label">Card — Cassette</div>
    <div class="card-cassette">
      <div class="cassette-stripe"></div>
      <div class="cassette-body">
        <h4>Side A — Mix Vol. 3</h4>
        <div class="side">C-90 · CHROME · 90 MIN</div>
        <div class="cassette-reels">
          <div class="reel"></div>
          <div class="reel"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
