<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A1A; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
  .space-chip { background: #0F0F2E; border: 1px solid #1A1A5C; border-radius: 2px; padding: 8px; text-align: center; }
  .bar { background: linear-gradient(90deg, #00F0FF, #BF00FF); border-radius: 1px; margin: 0 auto 6px; }
  .token { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: #5858AA; display: block; }
  .val { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #9898CC; display: block; margin-top: 2px; }
  h4 { font-family: 'Exo 2', sans-serif; font-size: 10px; color: #00F0FF; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }

  .radius-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .radius-demo { width: 44px; height: 44px; background: #13133A; border: 1px solid #00F0FF66; display: flex; align-items: center; justify-content: center; }
  .r-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: #5858AA; text-align: center; margin-top: 4px; }
  .r-val { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: #9898CC; text-align: center; }
</style>
</head>
<body>
  <h4>Spacing Scale</h4>
  <div class="grid">
    <div class="space-chip"><div class="bar" style="height:4px;width:4px;"></div><span class="token">--space-1</span><span class="val">4px</span></div>
    <div class="space-chip"><div class="bar" style="height:8px;width:8px;"></div><span class="token">--space-2</span><span class="val">8px</span></div>
    <div class="space-chip"><div class="bar" style="height:10px;width:16px;"></div><span class="token">--space-3</span><span class="val">16px</span></div>
    <div class="space-chip"><div class="bar" style="height:10px;width:24px;"></div><span class="token">--space-4</span><span class="val">24px</span></div>
    <div class="space-chip"><div class="bar" style="height:10px;width:32px;"></div><span class="token">--space-5</span><span class="val">32px</span></div>
    <div class="space-chip"><div class="bar" style="height:10px;width:48px;"></div><span class="token">--space-6</span><span class="val">48px</span></div>
    <div class="space-chip"><div class="bar" style="height:10px;width:60px;"></div><span class="token">--space-7</span><span class="val">64px</span></div>
    <div class="space-chip"><div class="bar" style="height:10px;width:80px;"></div><span class="token">--space-8</span><span class="val">96px</span></div>
    <div class="space-chip" style="grid-column:span 2;"><div class="bar" style="height:10px;width:100%;"></div><span class="token">--space-9</span><span class="val">128px</span></div>
  </div>

  <h4>Border Radius</h4>
  <div class="radius-row">
    <div><div class="radius-demo" style="border-radius:0px;"></div><div class="r-label">none</div><div class="r-val">0px</div></div>
    <div><div class="radius-demo" style="border-radius:2px;"></div><div class="r-label">sm</div><div class="r-val">2px</div></div>
    <div><div class="radius-demo" style="border-radius:4px;"></div><div class="r-label">base</div><div class="r-val">4px</div></div>
    <div><div class="radius-demo" style="border-radius:8px;"></div><div class="r-label">md</div><div class="r-val">8px</div></div>
    <div><div class="radius-demo" style="border-radius:16px;"></div><div class="r-label">lg</div><div class="r-val">16px</div></div>
    <div><div class="radius-demo" style="border-radius:999px;"></div><div class="r-label">pill</div><div class="r-val">999px</div></div>
  </div>
</body>
</html>
