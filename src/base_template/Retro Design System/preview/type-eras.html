<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Barlow+Condensed:wght@900&family=Playfair+Display:wght@700&family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0A0A1A; padding: 20px; }
  .row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
  .era-tag { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; width: 90px; flex-shrink: 0; font-family: monospace; }
  .sample { font-size: 32px; }
  .sub { font-size: 9px; color: #5858AA; font-family: monospace; margin-top: 3px; }
</style>
</head>
<body>
  <div class="row">
    <div class="era-tag" style="color:#00F0FF;">ERA D<br>Neon 80s</div>
    <div>
      <div class="sample" style="font-family:'Orbitron',sans-serif;font-weight:900;color:#E8E8FF;text-shadow:0 0 8px #FF2D78,0 0 20px #FF2D7866;letter-spacing:0.04em;">SYNTHWAVE</div>
      <div class="sub">Orbitron 900 · Geometric Futuristic</div>
    </div>
  </div>
  <div class="row">
    <div class="era-tag" style="color:#C8342A;">ERA A<br>50s/60s</div>
    <div>
      <div class="sample" style="font-family:'Barlow Condensed',sans-serif;font-weight:900;color:#C8342A;letter-spacing:0.02em;">AMERICANA</div>
      <div class="sub">Barlow Condensed 900 · Bold Industrial</div>
    </div>
  </div>
  <div class="row">
    <div class="era-tag" style="color:#D4621A;">ERA C<br>Groovy 70s</div>
    <div>
      <div class="sample" style="font-family:'Playfair Display',serif;font-weight:700;color:#D4621A;letter-spacing:0.01em;">Groovy Vibes</div>
      <div class="sub">Playfair Display 700 · Editorial Serif</div>
    </div>
  </div>
  <div class="row">
    <div class="era-tag" style="color:#C0C0C0;">ERA E<br>Pixel 90s</div>
    <div>
      <div class="sample" style="font-family:'Press Start 2P',monospace;font-size:18px;color:#C0C0C0;line-height:1.4;">PIXEL SYS</div>
      <div class="sub">Press Start 2P · 8-bit Bitmap</div>
    </div>
  </div>
</body>
</html>
