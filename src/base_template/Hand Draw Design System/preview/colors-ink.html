<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F3E9;font-family:'Patrick Hand',cursive;padding:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start}
.swatch{width:110px}
.color{height:72px;border-radius:2px;box-shadow:1px 2px 4px rgba(28,25,23,0.1)}
.token{font-size:10px;color:#44403C;margin-top:6px;line-height:1.4}
.hex{font-size:10px;color:#78716C}
.name{font-size:10px;color:#A8A29E;font-style:italic}
.group-label{width:100%;font-family:'Caveat',cursive;font-size:20px;font-weight:600;color:#1C1917;margin-bottom:2px}
</style></head><body>
<div class="group-label">Ink & pencil</div>
<div class="swatch"><div class="color" style="background:#1C1917"></div><div class="token">--color-ink</div><div class="hex">#1C1917</div><div class="name">Ink black</div></div>
<div class="swatch"><div class="color" style="background:#44403C"></div><div class="token">--color-ink-soft</div><div class="hex">#44403C</div><div class="name">Soft ink</div></div>
<div class="swatch"><div class="color" style="background:#78716C"></div><div class="token">--color-ink-faded</div><div class="hex">#78716C</div><div class="name">Faded ink</div></div>
<div class="swatch"><div class="color" style="background:#A8A29E"></div><div class="token">--color-ink-ghost</div><div class="hex">#A8A29E</div><div class="name">Ghost ink</div></div>
<div class="swatch"><div class="color" style="background:#D6D3D1;border:1px solid #E2DBCA"></div><div class="token">--color-pencil</div><div class="hex">#D6D3D1</div><div class="name">Pencil</div></div>
</body></html>
