<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F3E9;font-family:'Patrick Hand',cursive;padding:20px;display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start}
.tile{width:130px;height:90px;border-radius:2px;display:flex;align-items:center;justify-content:center;position:relative;font-size:12px;color:#44403C}
.group-label{width:100%;font-family:'Caveat',cursive;font-size:20px;font-weight:600;color:#1C1917;margin-bottom:2px}
.name{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:10px;color:#78716C}
</style></head><body>
<div class="group-label">Paper surface variants</div>
<div class="tile" style="background:#F7F3E9;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.75%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22300%22 height=%22300%22 filter=%22url(%23n)%22 opacity=%220.035%22/%3E%3C/svg%3E');border:1px solid #D6D3D1">plain<div class="name">.surface-plain</div></div>
<div class="tile" style="background:#F7F3E9;background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(0,0,0,0.06) 28px);border:1px solid #D6D3D1">lined<div class="name">.surface-lined</div></div>
<div class="tile" style="background:#F7F3E9;background-image:repeating-linear-gradient(rgba(0,0,0,0.05) 1px,transparent 1px),repeating-linear-gradient(90deg,rgba(0,0,0,0.05) 1px,transparent 1px);background-size:20px 20px,20px 20px;border:1px solid #D6D3D1">grid<div class="name">.surface-grid</div></div>
<div class="tile" style="background:#F7F3E9;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2220%22 height=%2220%22%3E%3Ccircle cx=%2210%22 cy=%2210%22 r=%221%22 fill=%22%23A8A29E%22 opacity=%220.5%22/%3E%3C/svg%3E');background-size:20px 20px;border:1px solid #D6D3D1">dotted<div class="name">.surface-dotted</div></div>
<div class="tile" style="background:#EDE8D5;background-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22300%22 height=%22300%22 filter=%22url(%23n)%22 opacity=%220.06%22/%3E%3C/svg%3E');border:1px solid #D6D3D1">craft<div class="name">.surface-craft</div></div>
</body></html>
