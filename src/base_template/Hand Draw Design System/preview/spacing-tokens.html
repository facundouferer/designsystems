<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F3E9;padding:20px;font-family:'Patrick Hand',cursive}
.grid{display:flex;flex-wrap:wrap;gap:14px}
.row{width:100%;display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px dashed #D6D3D1}
.bar{height:8px;background:#1C1917;border-radius:2px}
.token{font-size:11px;color:#A8A29E;min-width:90px}
.val{font-size:11px;color:#44403C;min-width:42px}
.label{font-family:'Caveat',cursive;font-size:18px;font-weight:600;color:#1C1917;margin-bottom:8px}
.demo-box{display:inline-flex;align-items:center;gap:4px;padding:8px 12px;background:#FDFAF3;border:1px solid #D6D3D1;border-radius:2px;font-size:12px;color:#44403C}
.sp{background:#E8C547;display:inline-block;height:100%}
</style></head><body>
<div class="label">Spacing scale</div>
<div class="grid">
  <div style="width:100%">
    <div class="row"><div class="token">--space-1</div><div class="val">4px</div><div class="bar" style="width:4px;height:14px"></div></div>
    <div class="row"><div class="token">--space-2</div><div class="val">8px</div><div class="bar" style="width:8px;height:14px"></div></div>
    <div class="row"><div class="token">--space-3</div><div class="val">12px</div><div class="bar" style="width:12px;height:14px"></div></div>
    <div class="row"><div class="token">--space-4</div><div class="val">16px</div><div class="bar" style="width:16px;height:14px"></div></div>
    <div class="row"><div class="token">--space-5</div><div class="val">24px</div><div class="bar" style="width:24px;height:14px"></div></div>
    <div class="row"><div class="token">--space-6</div><div class="val">32px</div><div class="bar" style="width:32px;height:14px"></div></div>
    <div class="row"><div class="token">--space-7</div><div class="val">48px</div><div class="bar" style="width:48px;height:14px"></div></div>
    <div class="row"><div class="token">--space-8</div><div class="val">64px</div><div class="bar" style="width:64px;height:14px"></div></div>
    <div class="row"><div class="token">--space-9</div><div class="val">96px</div><div class="bar" style="width:96px;height:14px"></div></div>
  </div>
</div>
</body></html>
