<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F3E9;padding:24px;font-family:'Patrick Hand',cursive;display:flex;flex-wrap:wrap;gap:20px;align-items:flex-start}
.glabel{font-family:'Caveat',cursive;font-size:18px;font-weight:600;color:#1C1917;width:100%}
.stamp{display:inline-flex;align-items:center;justify-content:center;padding:6px 14px;font-family:'Patrick Hand',cursive;font-size:13px;letter-spacing:0.12em;text-transform:uppercase;position:relative}
@keyframes wiggle{0%,100%{transform:rotate(-1.5deg)}50%{transform:rotate(1.5deg)}}
.stamp:hover{animation:wiggle 0.5s ease-in-out}
/* emphasis circle */
.circle-em{position:relative;display:inline-block;padding:2px 6px}
.circle-em svg{position:absolute;top:-6px;left:-6px;width:calc(100% + 12px);height:calc(100% + 12px);pointer-events:none}
@keyframes draw-circle{from{stroke-dashoffset:300}to{stroke-dashoffset:0}}
.circle-em:hover svg ellipse{stroke-dasharray:300;animation:draw-circle 0.5s cubic-bezier(0.45,0.05,0.55,1) forwards}
</style></head><body>

<div class="glabel">Stamps & seals</div>
<div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center">
  <div class="stamp" style="transform:rotate(-6deg)">
    <svg style="position:absolute;top:0;left:0;width:100%;height:100%" viewBox="0 0 100 36" preserveAspectRatio="none"><rect x="2" y="2" width="96" height="32" rx="1" stroke="#C8534A" stroke-width="2.5" fill="none" stroke-dasharray="none"/><line x1="0" y1="6" x2="100" y2="6" stroke="#C8534A" stroke-width="0.8" opacity="0.3"/><line x1="0" y1="30" x2="100" y2="30" stroke="#C8534A" stroke-width="0.8" opacity="0.3"/></svg>
    <span style="color:#C8534A;position:relative">DRAFT</span>
  </div>
  <div class="stamp" style="transform:rotate(4deg)">
    <svg style="position:absolute;top:0;left:0;width:100%;height:100%" viewBox="0 0 120 36" preserveAspectRatio="none"><rect x="2" y="2" width="116" height="32" rx="1" stroke="#5A9E6F" stroke-width="2.5" fill="none"/></svg>
    <span style="color:#5A9E6F;position:relative">APPROVED</span>
  </div>
  <div class="stamp" style="transform:rotate(-3deg)">
    <svg style="position:absolute;top:0;left:0;width:100%;height:100%" viewBox="0 0 80 36" preserveAspectRatio="none"><rect x="2" y="2" width="76" height="32" rx="1" stroke="#E8C547" stroke-width="2.5" fill="none"/></svg>
    <span style="color:#78716C;position:relative">TODO</span>
  </div>
  <div class="stamp" style="transform:rotate(5deg)">
    <svg style="position:absolute;top:0;left:0;width:100%;height:100%" viewBox="0 0 80 36" preserveAspectRatio="none"><rect x="2" y="2" width="76" height="32" rx="1" stroke="#5A9E6F" stroke-width="2.5" fill="none"/></svg>
    <span style="color:#5A9E6F;position:relative">DONE</span>
  </div>
  <div class="stamp" style="transform:rotate(-4deg)">
    <svg style="position:absolute;top:0;left:0;width:100%;height:100%" viewBox="0 0 100 36" preserveAspectRatio="none"><rect x="2" y="2" width="96" height="32" rx="1" stroke="#4A7FA5" stroke-width="2.5" fill="none"/></svg>
    <span style="color:#4A7FA5;position:relative">REVIEW</span>
  </div>
</div>

<div class="glabel">Circle emphasis (hover me)</div>
<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;font-family:'Lora',serif;font-size:18px;color:#1C1917">
  <span class="circle-em">important
    <svg viewBox="0 0 90 32" fill="none"><ellipse cx="45" cy="16" rx="42" ry="13" stroke="#C8534A" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="300" stroke-dashoffset="300"/></svg>
  </span>
  <span class="circle-em" style="font-family:'Caveat',cursive;font-size:24px;font-weight:700">key idea
    <svg viewBox="0 0 100 34" fill="none"><ellipse cx="50" cy="17" rx="47" ry="13" stroke="#4A7FA5" stroke-width="2" stroke-linecap="round" stroke-dasharray="300" stroke-dashoffset="300"/></svg>
  </span>
</div>

</body></html>
