<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F3E9;font-family:'Patrick Hand',cursive;padding:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start}
.swatch{width:120px}
.color{height:72px;border-radius:2px;position:relative;box-shadow:1px 2px 4px rgba(28,25,23,0.1)}
.token{font-size:11px;color:#44403C;margin-top:6px;line-height:1.4}
.hex{font-size:10px;color:#78716C}
.name{font-size:10px;color:#A8A29E;font-style:italic}
.group-label{width:100%;font-family:'Caveat',cursive;font-size:20px;font-weight:600;color:#1C1917;margin-bottom:2px;margin-top:8px}
</style></head><body>
<div class="group-label" style="width:100%">Paper surfaces</div>
<div class="swatch"><div class="color" style="background:#F7F3E9;border:1px solid #D6D3D1"></div><div class="token">--color-paper</div><div class="hex">#F7F3E9</div><div class="name">Cream paper</div></div>
<div class="swatch"><div class="color" style="background:#EDE8D5;border:1px solid #D6D3D1"></div><div class="token">--color-paper-aged</div><div class="hex">#EDE8D5</div><div class="name">Aged paper</div></div>
<div class="swatch"><div class="color" style="background:#E2DBCA;border:1px solid #D6D3D1"></div><div class="token">--color-paper-dark</div><div class="hex">#E2DBCA</div><div class="name">Dark paper</div></div>
<div class="swatch"><div class="color" style="background:#FDFAF3;border:1px solid #D6D3D1"></div><div class="token">--color-paper-white</div><div class="hex">#FDFAF3</div><div class="name">Near-white</div></div>
</body></html>
