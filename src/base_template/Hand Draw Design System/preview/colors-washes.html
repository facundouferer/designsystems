<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F3E9;font-family:'Patrick Hand',cursive;padding:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start}
.swatch{width:110px}
.color{height:64px;border-radius:2px;border:1.5px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center}
.sample{font-family:'Patrick Hand',cursive;font-size:12px;color:#1C1917}
.token{font-size:10px;color:#44403C;margin-top:6px;line-height:1.4}
.hex{font-size:10px;color:#78716C}
.group-label{width:100%;font-family:'Caveat',cursive;font-size:20px;font-weight:600;color:#1C1917;margin-bottom:2px}
</style></head><body>
<div class="group-label">Watercolor washes</div>
<div class="swatch"><div class="color" style="background:#F9ECEA"><span class="sample" style="color:#C8534A">error text</span></div><div class="token">--wash-red</div><div class="hex">#F9ECEA</div></div>
<div class="swatch"><div class="color" style="background:#FDF8E3"><span class="sample" style="color:#78716C">warning</span></div><div class="token">--wash-yellow</div><div class="hex">#FDF8E3</div></div>
<div class="swatch"><div class="color" style="background:#EAF4EE"><span class="sample" style="color:#5A9E6F">success</span></div><div class="token">--wash-green</div><div class="hex">#EAF4EE</div></div>
<div class="swatch"><div class="color" style="background:#E8F2F8"><span class="sample" style="color:#4A7FA5">info note</span></div><div class="token">--wash-blue</div><div class="hex">#E8F2F8</div></div>
<div class="swatch"><div class="color" style="background:#F3EFF8"><span class="sample" style="color:#8B6BAE">accent</span></div><div class="token">--wash-purple</div><div class="hex">#F3EFF8</div></div>
<div class="swatch"><div class="color" style="background:#FDF0E8"><span class="sample" style="color:#D4845A">warm</span></div><div class="token">--wash-orange</div><div class="hex">#FDF0E8</div></div>
</body></html>
