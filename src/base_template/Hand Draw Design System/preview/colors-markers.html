<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Caveat:wght@600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F7F3E9;font-family:'Patrick Hand',cursive;padding:20px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start}
.swatch{width:110px}
.color{height:72px;border-radius:2px;box-shadow:1px 2px 4px rgba(28,25,23,0.12)}
.token{font-size:10px;color:#44403C;margin-top:6px;line-height:1.4}
.hex{font-size:10px;color:#78716C}
.name{font-size:10px;color:#A8A29E;font-style:italic}
.group-label{width:100%;font-family:'Caveat',cursive;font-size:20px;font-weight:600;color:#1C1917;margin-bottom:2px}
</style></head><body>
<div class="group-label">Marker colors</div>
<div class="swatch"><div class="color" style="background:#C8534A"></div><div class="token">--marker-red</div><div class="hex">#C8534A</div><div class="name">Red marker</div></div>
<div class="swatch"><div class="color" style="background:#E8C547"></div><div class="token">--marker-yellow</div><div class="hex">#E8C547</div><div class="name">Yellow marker</div></div>
<div class="swatch"><div class="color" style="background:#5A9E6F"></div><div class="token">--marker-green</div><div class="hex">#5A9E6F</div><div class="name">Green marker</div></div>
<div class="swatch"><div class="color" style="background:#4A7FA5"></div><div class="token">--marker-blue</div><div class="hex">#4A7FA5</div><div class="name">Blue marker</div></div>
<div class="swatch"><div class="color" style="background:#8B6BAE"></div><div class="token">--marker-purple</div><div class="hex">#8B6BAE</div><div class="name">Purple marker</div></div>
<div class="swatch"><div class="color" style="background:#D4845A"></div><div class="token">--marker-orange</div><div class="hex">#D4845A</div><div class="name">Orange marker</div></div>
</body></html>
